query MyQuery($receiver: String, $limit: Int) {
  Tron(network: tron, dataset: combined) {
    Transfers(
      limit: {count: $limit}
      where: {
        TransactionStatus: {Success: true}
        Transfer: {
          Receiver: {is: $receiver}
          Amount: {gt: "0.1"}
        }
      }
      orderBy: {descending: Block_Time}
    ) {
      Block {
        Time
        Number
      }
      Transfer {
        Receiver
        Sender
        Amount
        AmountInUSD
        Currency {
          Name
          Symbol
          Decimals
          SmartContract
        }
      }
      Transaction {
        Hash
      }
    }
  }
}
