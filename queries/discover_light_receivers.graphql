# Receivers with fewer matching transfers (for light-load SLA probes).
query DiscoverLightReceivers($pool_size: Int) {
  Tron(network: tron, dataset: combined) {
    Transfers(
      where: {
        Block: {Time: {since_relative: {days_ago: 90}}}
        TransactionStatus: {Success: true}
        Transfer: {Amount: {gt: "0.1"}}
      }
      orderBy: {ascendingByField: "txs"}
      limit: {count: $pool_size}
    ) {
      Transfer {
        Receiver
      }
      txs: count
    }
  }
}
